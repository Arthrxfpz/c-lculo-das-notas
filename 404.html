<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>404 — Cálculo das notas</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<style>
:root {
  --bg0:#08090E; --bg1:#13141A; --bg2:#1E1F27;
  --line2:rgba(120,122,160,.22); --line3:rgba(120,122,160,.12);
  --t1:#F0F0FA; --t2:rgba(220,220,245,.52); --t3:rgba(220,220,245,.24);
  --gold:#FFD60A; --goldbg:rgba(255,214,10,.10); --goldbd:rgba(255,214,10,.26);
  --ff:-apple-system,BlinkMacSystemFont,'SF Pro Display','SF Pro Text','Helvetica Neue',sans-serif;
  --ease-ios:cubic-bezier(0.25,0.46,0.45,0.94);
  --ease-spring:cubic-bezier(0.34,1.56,0.64,1);
}
[data-theme="light"] {
  --bg0:#EEF2F8; --bg1:#FFFFFF; --bg2:#E6EBF4;
  --line2:rgba(30,45,90,.10); --line3:rgba(30,45,90,.055);
  --t1:#0C1324; --t2:rgba(18,32,70,.55); --t3:rgba(18,32,70,.28);
  --gold:#8A5C00; --goldbg:rgba(138,92,0,.09); --goldbd:rgba(138,92,0,.24);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: var(--bg0);
  color: var(--t1);
  font-family: var(--ff);
  -webkit-font-smoothing: antialiased;
}



/* main */
.page {
  height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 0 24px;
  animation: in .5s var(--ease-ios) both;
}
@keyframes in {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

.code {
  font-size: clamp(72px, 18vw, 96px);
  font-weight: 800;
  letter-spacing: -3px;
  line-height: 1;
  color: var(--gold);
  user-select: none;
  margin-bottom: 20px;
}

.label {
  font-size: 17px;
  font-weight: 600;
  color: var(--t1);
  letter-spacing: -0.3px;
  margin-bottom: 8px;
}

.desc {
  font-size: 14px;
  font-weight: 400;
  color: var(--t2);
  line-height: 1.55;
  text-align: center;
  max-width: 260px;
  margin-bottom: 32px;
}

.btn {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  height: 46px;
  padding: 0 22px;
  background: var(--gold);
  color: #000;
  font-family: var(--ff);
  font-size: 14px;
  font-weight: 700;
  letter-spacing: -0.15px;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  text-decoration: none;
  transition: transform .13s var(--ease-spring), opacity .15s;
  -webkit-tap-highlight-color: transparent;
}
[data-theme="light"] .btn { color: #fff; }
.btn:active { transform: scale(.94); opacity: .85; }
.btn svg { width: 16px; height: 16px; flex-shrink: 0; }
</style>
</head>
<body>
<script>
(function(){
  try {
    var t = localStorage.getItem('t205_theme');
    if (t === 'light' || t === 'dark') { document.documentElement.setAttribute('data-theme', t); return; }
  } catch(e) {}
  if (window.matchMedia && !window.matchMedia('(prefers-color-scheme: dark)').matches)
    document.documentElement.setAttribute('data-theme', 'light');
})();
</script>

<main class="page">
  <div class="code">404</div>
  <h1 class="label">Página não encontrada</h1>
  <p class="desc">Esse endereço não existe ou foi removido.</p>
  <a class="btn" href="https://arthrxfpz.github.io/c-lculo-das-notas/">
    <svg viewBox="0 0 16 16" fill="none">
      <path d="M6.5 3L2 8l4.5 5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="2" y1="8" x2="14" y2="8" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
    </svg>
    Voltar para o início
  </a>
</main>
</body>
</html>
